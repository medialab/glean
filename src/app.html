<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="robots" content="index, follow" />

		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Design Team Portfolio" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:image" content="https://medialab.github.io/glean/og/og.png" />
		<meta property="og:image:alt" content="Design Team Portfolio preview" />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="https://medialab.github.io/glean/og/og.png" />
		<meta name="twitter:image:alt" content="Design Team Portfolio preview" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<link rel="preconnect" href="https://cataas.com" crossorigin />

		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" style="background-color: #f9f9f9">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
