name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout svelte-pdf dependency
        uses: actions/checkout@v4
        with:
          repository: TommasoPrinetti/svelte-pdf
          path: svelte-pdf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install svelte-pdf dependencies
        working-directory: svelte-pdf
        run: bun install

      - name: Build svelte-pdf
        working-directory: svelte-pdf
        run: bun run package

      - name: Update package.json to use local svelte-pdf
        run: |
          node -e "const fs=require('fs');const path='package.json';const pkg=JSON.parse(fs.readFileSync(path,'utf8'));pkg.dependencies=pkg.dependencies||{};pkg.dependencies['svelte-pdf']='file:./svelte-pdf';fs.writeFileSync(path,JSON.stringify(pkg,null,'\t')+'\n');"

      - name: Install project dependencies
        run: bun install

      - name: Create image twins
        run: bun run imgYmlCreator

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Dither images
        env:
          NODE_OPTIONS: '--max-old-space-size=6144'
        run: bun run dither && bun run dither:check

      - name: Build SvelteKit app
        env:
          NODE_ENV: production
          NODE_OPTIONS: '--max-old-space-size=6144'
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
